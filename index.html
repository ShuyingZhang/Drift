<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漂移 · Drift — 联想激活工具</title>
  <meta name="description" content="导入笔记，随机抽取卡片，帮助思绪在安静的界面中自由连接。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 粒子背景 -->
  <canvas id="canvas-bg"></canvas>

  <!-- 顶部导航 -->
  <header class="nav" id="nav">
    <div class="nav-brand">
      <span class="nav-dot"></span>
      <span class="nav-title">漂移 · Drift</span>
    </div>
    <div class="nav-actions">
      <button class="btn-ghost" id="btn-import" type="button" title="导入笔记">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>导入笔记</span>
      </button>
      <button class="btn-ghost" id="btn-wander" type="button" title="漫游模式" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        <span>漫游</span>
      </button>
    </div>
  </header>

  <!-- 主舞台 -->
  <main class="stage" id="stage">

    <!-- 空白欢迎态 -->
    <div class="empty-state" id="empty-state">
      <h1 class="empty-title">让思维漂流</h1>
      <p class="empty-desc">导入笔记后，Drift 会随机抽取卡片，让相邻的想法自然相遇。</p>
      <button class="btn-primary" id="btn-start" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        开始导入笔记
      </button>
    </div>

    <!-- 卡片容器 -->
    <div class="cards-container" id="cards-container"></div>

  </main>

  <!-- 底部控制栏 -->
  <footer class="controls" id="controls" aria-label="抽卡控制">
    <div class="controls-inner">

      <!-- 模式选择 -->
      <div class="mode-group" id="mode-group">
        <span class="mode-label">抽取</span>
        <button class="mode-btn active" data-mode="1" id="mode-1" type="button" aria-pressed="true">1张<span>聚焦</span></button>
        <button class="mode-btn" data-mode="2" id="mode-2" type="button" aria-pressed="false">2张<span>碰撞</span></button>
        <button class="mode-btn" data-mode="n" id="mode-n" type="button" aria-pressed="false">
          <input type="number" id="n-input" min="3" max="12" value="3" />张<span>风暴</span>
        </button>
      </div>

      <!-- 主按钮 -->
      <button class="btn-draw" id="btn-draw" type="button">
        <span class="btn-draw-text">随机漂浮</span>
        <span class="btn-draw-sub" id="card-count-display">共 0 张卡片</span>
      </button>

      <!-- 漫游控制 -->
      <div class="wander-group" id="wander-group">
        <span class="mode-label">间隔</span>
        <div class="slider-wrap">
          <input type="range" id="wander-interval" min="2" max="20" value="5" />
          <span id="interval-display">5s</span>
        </div>
      </div>

    </div>
  </footer>

  <!-- 导入面板 (Modal) -->
  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div class="modal" id="import-modal" role="dialog" aria-modal="true" aria-labelledby="import-title">
      <div class="modal-header">
        <h2 id="import-title">导入笔记</h2>
        <button class="modal-close" id="modal-close" type="button" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="modal-tips">
        <p>用 <code>---</code> 分隔多张卡片；没有分隔符时，每行会成为一张卡片。</p>
      </div>

      <div class="import-tabs" role="tablist" aria-label="导入方式">
        <button class="tab-btn active" data-tab="paste" id="tab-paste" type="button" role="tab" aria-selected="true">粘贴文本</button>
        <button class="tab-btn" data-tab="file" id="tab-file" type="button" role="tab" aria-selected="false">上传文件</button>
        <button class="tab-btn" data-tab="manage" id="tab-manage" type="button" role="tab" aria-selected="false">管理卡片</button>
      </div>

      <!-- 粘贴面板 -->
      <div class="tab-panel active" id="panel-paste">
        <textarea id="paste-area" placeholder="在此粘贴你的笔记内容...
用 --- 分隔卡片，例如：

深度工作需要刻意练习
---
习惯的本质是神经回路的固化
---
系统比目标更重要"></textarea>
        <div class="modal-actions">
          <span class="parse-info" id="parse-info" aria-live="polite"></span>
          <button class="btn-primary" id="btn-parse" type="button">解析并导入</button>
        </div>
      </div>

      <!-- 文件上传面板 -->
      <div class="tab-panel" id="panel-file">
        <div class="drop-zone" id="drop-zone">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>拖拽文件到此处</p>
          <p class="drop-sub">支持 .txt / .md 文件</p>
          <input type="file" id="file-input" accept=".txt,.md" multiple hidden />
          <button class="btn-ghost" id="btn-choose-file" type="button">选择文件</button>
        </div>
      </div>

      <!-- 管理面板 -->
      <div class="tab-panel" id="panel-manage">
        <div class="manage-toolbar">
          <span id="manage-count">0 张卡片</span>
          <button class="btn-danger-ghost" id="btn-clear-all" type="button">清空全部</button>
        </div>
        <div class="cards-list" id="cards-list"></div>
      </div>

    </div>
  </div>

  <!-- 卡片详情视图 -->
  <div class="card-detail-backdrop" id="card-detail-backdrop" aria-hidden="true">
    <div class="card-detail" id="card-detail" role="dialog" aria-modal="true" aria-label="卡片详情">
      <button class="card-detail-close" id="card-detail-close" type="button" aria-label="关闭">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="card-detail-content" id="card-detail-content"></div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="app.js"></script>
</body>
</html>
